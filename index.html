<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f4f4f9; }
        .header { text-align: center; margin-bottom: 16px; max-width: 42rem; margin-left: auto; margin-right: auto; }
        .header-note { font-size: 0.9rem; color: #444; line-height: 1.45; margin: 0.5rem 0 0; }
        .header-actions { margin-top: 0.75rem; font-size: 0.95rem; }
        .header-actions a { color: #1a73e8; }
        .looker-section {
            margin: 0 auto 28px;
            width: 100%;
            max-width: 1200px;
        }
        .looker-frame-wrap {
            position: relative;
            width: 100%;
            border: 1px solid #ccc;
            background: #fff;
            overflow: hidden;
            box-sizing: border-box;
            aspect-ratio: 600 / 450;
            max-height: min(92vh, 960px);
        }
        .looker-frame-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <section class="looker-section" aria-label="Looker Studio report">
        <div class="looker-frame-wrap">
            <iframe
                title="Looker Studio dashboard"
                loading="lazy"
                src="https://lookerstudio.google.com/embed/reporting/67e351b1-9170-4a8b-8c32-652529f2a0b1/page/XTL8D"
                allowfullscreen
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
        </div>
    </section>
</body>
</html>
