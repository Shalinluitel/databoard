<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f4f4f9; }
        .page-title {
            text-align: center;
            margin: 0 0 16px;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .looker-section {
            margin: 0 auto 28px;
            width: 100%;
            max-width: 1200px;
        }
        .looker-frame-wrap {
            position: relative;
            width: 100%;
            border: 1px solid #ccc;
            background: #fff;
            overflow: hidden;
            box-sizing: border-box;
            aspect-ratio: 600 / 450;
            max-height: min(92vh, 960px);
        }
        .looker-frame-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <h1 class="page-title">New dashboard</h1>
    <section class="looker-section" aria-label="Looker Studio report">
        <div class="looker-frame-wrap">
            <iframe
                title="Looker Studio dashboard"
                loading="lazy"
                src="https://lookerstudio.google.com/embed/reporting/dfba19bb-d987-40c4-82e3-b94eb2b3db63/page/qgR"
                allowfullscreen
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
        </div>
    </section>
</body>
</html>
