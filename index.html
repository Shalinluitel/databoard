<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f4f4f9; }
        .header { text-align: center; margin-bottom: 16px; }
        .looker-section {
            margin: 0 auto 28px;
            width: 100%;
            max-width: 1200px;
        }
        .looker-frame-wrap {
            position: relative;
            width: 100%;
            border: 1px solid #ccc;
            background: #fff;
            overflow: hidden;
            box-sizing: border-box;
            aspect-ratio: 600 / 450;
            max-height: min(92vh, 960px);
        }
        .looker-frame-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboard</h1>
    </div>

    <section class="looker-section" aria-label="Looker Studio report">
        <div class="looker-frame-wrap">
            <iframe
                title="Looker Studio dashboard"
                loading="lazy"
                src="https://lookerstudio.google.com/embed/reporting/67e351b1-9170-4a8b-8c32-652529f2a0b1/page/XTL8D"
                allowfullscreen
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
        </div>
    </section>
</body>
</html>
